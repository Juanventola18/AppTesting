name: Facturacion CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html
        # Si tenes un archivo requirements.txt lo usa, sino sigue de largo
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

 
    - name: Ejecutar Pruebas Automatizadas
      run: |
        # Agregamos el punto para que busque en la raíz
        export PYTHONPATH=$PYTHONPATH:.
        pytest --html=reporte_final.html --self-contained-html

    - name: Subir Reporte como Artefacto
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reporte-pruebas-facturacion
        path: reporte_final.html
